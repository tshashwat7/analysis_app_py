<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>📈 NSE Stock Analyzer (AG Grid)</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community/styles/ag-grid.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community/styles/ag-theme-alpine.css" />

    <script src="https://cdn.jsdelivr.net/npm/ag-grid-community/dist/ag-grid-community.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ag-grid-enterprise/dist/ag-grid-enterprise.min.js"></script>
    <link href="{{ url_for('static', path='css/index.css') }}" rel="stylesheet">
</head>

<body>
    <h1>📈 NSE Stock Analyzer</h1>

    <!-- ✅ Macro Metrics Widget -->
    <div id="macroWidget"
        style="text-align:center; padding: 10px; background: #fff; margin: 0 auto 15px auto; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); max-width: 800px; display: none; gap: 15px; justify-content: center; flex-wrap: wrap;">
    </div>

    <div class="controls">
        <form action="/analyze" method="get" style="display:inline-block;">
            <input name="symbol" placeholder="Enter ticker (e.g. RELIANCE.NS)" required>
            <button type="submit">Analyze</button>
        </form>
        <br>

        <select id="indexSelect">
            <option value="nifty50">Nifty 50</option>
            <option value="nifty100">Nifty 100</option>
            <option value="niftynext50">Nifty Next 50</option>
            <option value="nifty500">Nifty 500</option>
            <option value="midcap150">Midcap 150</option>
            <option value="smallcap100">Smallcap 100</option>
            <option value="NSEStock">All Stocks</option>
        </select>
        <button id="loadBtn" onclick="loadIndex()">🔄 Load Index</button>

        <!-- Fetch Corp Actions (separate pool) -->
        <button id="fetchCorpBtn" onclick="fetchCorpActions()" style="background:#0ea5e9;">📋 Fetch Corp Actions</button>

        <!-- Confidence floor filter -->
        <label style="margin-left:12px;font-weight:600;">Conf ≥</label>
        <input type="number" id="confFloor" min="0" max="100" step="5"
            style="width:60px;text-align:center;font-weight:700;" oninput="if(gridApi) gridApi.onFilterChanged()">
        
        <!-- Profit % sort shortcut -->
        <button
            onclick="if(gridApi) gridApi.applyColumnState({state:[{colId:'profit_pct',sort:'desc'}],defaultState:{sort:null}})"
            style="background:#16a34a;">📈 Sort Profit %</button>

        <br>
        <button id="startBtn" onclick="startAutoAnalyze()" disabled>Start Auto Analysis</button>
        <button id="stopBtn" onclick="stopAutoAnalyze()" disabled>Stop</button>
        <button onclick="gridApi.exportDataAsCsv()">Export CSV</button>
        <a href="/paper_trades" target="_blank" style="text-decoration:none;">
            <button style="background:#8b5cf6;" type="button">📊 Paper Trades</button>
        </a>
        <a href="/multibagger_dashboard" target="_blank" style="text-decoration:none;">
            <button style="background:#7c3aed;" type="button">🚀 Multibagger Picks</button>
        </a>
    </div>

    <div id="corpActionsBanner" class="loading">
        💡 Click 'Fetch Corp Actions' to load upcoming splits, bonus & dividends.
    </div>

    <div class="progress">
        <div id="progressBar" class="progress-bar"></div>
    </div>
    <div id="status" class="status">Idle</div>

    <div id="myGrid" class="ag-theme-alpine"></div>

    <script>
        let gridApi;
        let isAutoAnalysisActive = false;
        let _corpActionsReady = false;
        let isPageAnalyzing = false;
        let lastAnalyzedPage = -1;

        function setStatus(t) {
            const el = document.getElementById("status");
            if (el) el.innerText = t;
        }
        function setProgress(p) {
            const el = document.getElementById("progressBar");
            if (el) el.style.width = p + "%";
        }

        const columnDefs = [
            {
                field: "symbol",
                headerName: "Ticker",
                pinned: 'left',
                width: 115,
                flex: 0,
                filter: 'agTextColumnFilter',
                cellRenderer: p => `<a href="/analyze?symbol=${p.value}" class="ticker-link" target="_blank">${p.value}</a>`
            },
            {
                field: "recommendation", headerName: "Rec.", width: 115, flex: 0, sortable: true,
                filter: 'agSetColumnFilter',
                valueGetter: p => (p.data.recommendation || "").split("--")[0] || p.data.recommendation,
                tooltipValueGetter: p => {
                    const cat = (p.data.recommendation || "").split("--")[0];
                    const sig = p.data.bull_signal || 'HOLD';
                    if (cat === 'BUY' && sig === 'HOLD') return `Profile qualified as BUY but execution is gated (HOLD signal). See detail page for reason.`;
                    return `${cat} — trade signal: ${sig}`;
                },
                cellClass: p => {
                    const v = (p.data.recommendation || "").split("--")[0];
                    if (v === 'BUY' && p.data.bull_signal === 'HOLD') return 'hold-cell';
                    return v === 'BUY' ? 'buy-cell' : v === 'SELL' ? 'sell-cell' : 'hold-cell';
                }
            },
            {
                field: "best_fit_horizon", headerName: "Horizon", width: 135, flex: 0, sortable: true,
                filter: 'agSetColumnFilter',
                valueGetter: p => {
                    if (p.data.best_fit_horizon) return p.data.best_fit_horizon;
                    const parts = (p.data.recommendation || "").split("--");
                    return parts[1] || "";
                },
                cellRenderer: p => {
                    const map = { intraday: "Intraday", short_term: "Short", long_term: "Long", multibagger: "Multi" };
                    const colors = {
                        intraday: { bg: "#e0f2fe", color: "#0369a1" },
                        short_term: { bg: "#f0fdf4", color: "#166534" },
                        long_term: { bg: "#fefce8", color: "#92400e" },
                        multibagger: { bg: "#faf5ff", color: "#7e22ce" },
                    };
                    const v = p.value || "";
                    const c = colors[v] || { bg: "#f3f4f6", color: "#555" };
                    const label = map[v] || v;
                    if (!label) return '<span style="color:#ccc">-</span>';
                    return `<span style="background:${c.bg};color:${c.color};padding:2px 7px;border-radius:12px;font-size:11px;font-weight:600;">${label}</span>`;
                }
            },
            {
                field: "bull_signal", headerName: "Signal", width: 115, flex: 0, sortable: true,
                filter: 'agSetColumnFilter',
                cellRenderer: p => {
                    const sig = p.value || 'HOLD';
                    const profCat = p.data.profile_category || (p.data.recommendation || "").split("--")[0];
                    const conflict = (profCat === 'BUY' && sig === 'HOLD');
                    const cls = sig === 'BUY' ? 'buy-cell' : sig === 'SELL' ? 'sell-cell' : 'hold-cell';
                    const conflictIcon = conflict
                        ? `<span title="Profile qualified BUY but execution blocked. Check detail page."
                                 style="cursor:help;margin-left:4px;font-size:11px;">⚠️</span>`
                        : '';
                    return `<span class="${cls}">${sig}</span>${conflictIcon}`;
                }
            },
            {
                headerName: "Exec", width: 115, flex: 0,
                filter: 'agSetColumnFilter',
                filterValueGetter: p => {
                    if (!p.data) return "OK";
                    const profCat = p.data.recommendation?.split("--")[0];
                    return (profCat === 'BUY' && p.data.bull_signal === 'HOLD') ? "Blocked" : "OK";
                },
                cellRenderer: p => {
                    const profCat = p.data.recommendation?.split("--")[0];
                    if (profCat === 'BUY' && p.data.bull_signal === 'HOLD') {
                        return `<span title="Profile BUY but execution gated — click ticker for details"
                                      style="background:#fef3c7;color:#92400e;padding:2px 6px;
                                             border-radius:10px;font-size:10px;font-weight:700;cursor:help;">⛔ Gate</span>`;
                    }
                    return `<span style="color:#d1d5db;font-size:11px;">✓</span>`;
                }
            },
            {
                field: "score", headerName: "Score", width: 115, flex: 0, sortable: true,
                filter: 'agNumberColumnFilter',
                cellClass: p => p.value >= 70 ? 'score-buy' : p.value < 40 ? 'score-sell' : 'score-hold'
            },
            {
                field: "confidence", headerName: "Conf %", width: 110, flex: 0, sortable: true,
                filter: 'agNumberColumnFilter',
                cellRenderer: params => {
                    const val = params.value || 0;
                    const color = val > 70 ? '#22c55e' : val > 40 ? '#facc15' : '#ef4444';
                    return `<span style="font-size:11px;font-weight:700;margin-right:4px;">${val}%</span>
                        <span style="display:inline-block;width:40px;background:#eee;height:6px;border-radius:3px;vertical-align:middle;">
                          <span style="display:block;width:${val}%;background:${color};height:100%;border-radius:3px;"></span>
                        </span>`;
                }
            },
            {
                field: "sectorName", headerName: "Sector", width: 160, flex: 0, sortable: true,
                filter: 'agSetColumnFilter',
                cellRenderer: p => {
                    if (!p.value) return '<span style="color:#ccc">-</span>';
                    return `<span style="color:#64748b;font-size:11px;font-weight:600;">${p.value}</span>`;
                }
            },
            {
                field: "sectorTrendScore", headerName: "Sec. Trend", width: 115, flex: 0, sortable: true,
                filter: 'agNumberColumnFilter',
                cellRenderer: p => {
                    if (p.value === null || p.value === undefined) return '-';
                    const color = p.value >= 0 ? '#16a34a' : '#dc2626';
                    const bg = p.value >= 0 ? '#f0fdf4' : '#fef2f2';
                    return `<span style="background:${bg};color:${color};padding:2px 6px;border-radius:4px;font-size:11px;font-weight:700;">${p.value.toFixed(1)}</span>`;
                }
            },
            {
                field: "rsVsSectorFast", headerName: "RS vs Sec.", width: 115, flex: 0, sortable: true,
                filter: 'agNumberColumnFilter',
                cellRenderer: p => {
                    if (p.value === null || p.value === undefined) return '-';
                    const color = p.value >= 0 ? '#16a34a' : '#dc2626';
                    return `<span style="color:${color};font-weight:700;font-size:11px;">${p.value > 0 ? '+' : ''}${p.value.toFixed(1)}%</span>`;
                }
            },
            {
                field: "top_pattern", headerName: "Pattern", width: 165, flex: 0,
                filter: 'agSetColumnFilter',
                cellRenderer: p => {
                    if (!p.value) return '<span style="color:#ccc">-</span>';
                    const v = p.value.toLowerCase();
                    let color = "#1e40af", bg = "#dbeafe";
                    if (v.includes("gold") || v.includes("cup") || v.includes("vcp")) {
                        color = "#166534"; bg = "#dcfce7";
                    } else if (v.includes("death") || v.includes("top")) {
                        color = "#991b1b"; bg = "#fee2e2";
                    }
                    return `<span style="background:${bg};color:${color};padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600;">${p.value}</span>`;
                }
            },
            {
                field: "best_strategy", headerName: "Top Strategy", width: 165, flex: 0, sortable: true,
                filter: 'agSetColumnFilter',
                cellRenderer: p => {
                    const s = p.value;
                    if (!s || s === "N/A" || s === "unknown") return '-';
                    return `<span class="strat-badge">${s.toUpperCase()}</span>`;
                }
            },
            {
                field: "profit_pct", headerName: "Profit %", width: 145, flex: 0, sortable: true,
                filter: 'agNumberColumnFilter',
                valueGetter: p => {
                    if (p.data.profit_pct !== null && p.data.profit_pct !== undefined) return p.data.profit_pct;
                    const e = parseFloat(p.data.entry_trigger), t = parseFloat(p.data.t1);
                    if (e > 0 && t > 0) return parseFloat(((t - e) / e * 100).toFixed(2));
                    return null;
                },
                cellRenderer: p => {
                    if (p.value === null || p.value === undefined) return '-';
                    const pct = parseFloat(p.value);
                    const color = pct >= 0 ? '#16a34a' : '#dc2626';
                    return `<span style="color:${color};font-weight:700;">${p.value > 0 ? '+' : ''}${pct.toFixed(1)}%</span>`;
                }
            },
            {
                field: "rrRatio", headerName: "R:R", width: 115, flex: 0, sortable: true,
                valueFormatter: p => p.value ? p.value + "R" : "-"
            },
            {
                field: "corp_action", headerName: "Events", width: 185, flex: 0, sortable: true,
                cellRenderer: p => {
                    const raw = p.value || "";
                    if (!raw || raw === "-") return '<span style="color:#d1d5db;font-size:11px;">—</span>';
                    return `<span style="background:#f3f4f6;color:#374151;padding:2px 7px;border-radius:10px;font-size:11px;">${raw}</span>`;
                }
            },
            {
                field: "name", headerName: "Company Name", width: 235, flex: 0, filter: 'agTextColumnFilter'
            }
        ];

        const gridOptions = {
            columnDefs: columnDefs,
            theme: "legacy",
            rowData: [],
            rowModelType: 'clientSide',
            pagination: true,
            paginationPageSize: 50,
            paginationPageSizeSelector: [20, 50, 100, 500],
            defaultColDef: { resizable: true, sortable: true, filter: true, flex: 0, minWidth: 60 },
            getRowId: params => params.data.symbol,
            enableBrowserTooltips: true,
            onPaginationChanged: onPageChange,
            isExternalFilterPresent: () => {
                const floor = parseInt(document.getElementById('confFloor')?.value) || 0;
                return floor > 0;
            },
            doesExternalFilterPass: node => {
                const floor = parseInt(document.getElementById('confFloor')?.value) || 0;
                return (node.data.confidence || 0) >= floor;
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            const gridDiv = document.querySelector('#myGrid');
            gridApi = agGrid.createGrid(gridDiv, gridOptions);
            loadMacroMetrics();
        });

        async function loadMacroMetrics() {
            try {
                const response = await fetch('/api/macro_metrics');
                if (!response.ok) throw new Error('Failed to fetch macro metrics');
                const data = await response.json();
                const widget = document.getElementById('macroWidget');
                if (Object.keys(data).length > 0 && !data.error) {
                    let html = '';
                    for (const [key, info] of Object.entries(data)) {
                        let colorStr = "#333";
                        if (info.value === "N/A") colorStr = "#999";
                        else if (key.includes("Growth")) colorStr = info.value > 0 ? "#16a34a" : "#dc2626";
                        html += `
                            <div style="display:flex; flex-direction:column; align-items:center; min-width:90px;">
                                <span style="font-size:11px; color:#666; font-weight:600; text-transform:uppercase;">${key.replace(" (%)", "").replace(" ($)", "")}</span>
                                <span style="font-size:15px; font-weight:bold; color:${colorStr}">${info.value}${key.includes("(%)") && info.value !== "N/A" ? '%' : ''}</span>
                            </div>
                        `;
                    }
                    widget.innerHTML = html;
                    widget.style.display = 'flex';
                }
            } catch (err) { console.error("Macro metrics error:", err); }
        }

        function onPageChange() {
            if (isAutoAnalysisActive && !isPageAnalyzing) {
                const currentPage = gridApi.paginationGetCurrentPage();
                if (currentPage !== lastAnalyzedPage) analyzeCurrentView();
            }
        }

        const wait = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        async function fetchQuickScoreBatch(batch, index_name, maxRetries = 3) {
            for (let attempt = 1; attempt <= maxRetries; attempt++) {
                try {
                    const resp = await fetch("/quick_scores", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ symbols: batch, index_name: index_name })
                    });
                    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                    return await resp.json();
                } catch (err) {
                    console.error(`Batch failed (attempt ${attempt}/${maxRetries}):`, err);
                    if (attempt === maxRetries) throw err;
                    await wait(1200 * attempt);
                }
            }
        }

        async function analyzeCurrentView() {
            if (!gridApi || isPageAnalyzing) return;
            isPageAnalyzing = true;

            const index_name = document.getElementById("indexSelect").value;
            const pageSize = gridApi.paginationGetPageSize();
            const currentPage = gridApi.paginationGetCurrentPage();
            const totalPages = gridApi.paginationGetTotalPages();
            const startRow = currentPage * pageSize;
            const endRow = startRow + pageSize;

            const symbolsToAnalyze = [];
            let remainingUnanalyzed = 0;
            let firstUnanalyzedIndex = -1;

            gridApi.forEachNodeAfterFilterAndSort((node, idx) => {
                const needsAnalysis = node.data.score === null || node.data.score === undefined;
                if (needsAnalysis) {
                    remainingUnanalyzed += 1;
                    if (firstUnanalyzedIndex === -1) firstUnanalyzedIndex = idx;
                    if (idx >= startRow && idx < endRow) symbolsToAnalyze.push(node.data.symbol);
                }
            });

            if (symbolsToAnalyze.length === 0) {
                if (remainingUnanalyzed > 0 && firstUnanalyzedIndex !== -1) {
                    const targetPage = Math.floor(firstUnanalyzedIndex / pageSize);
                    setStatus(`Jumping to Page ${targetPage + 1}...`);
                    lastAnalyzedPage = currentPage;
                    isPageAnalyzing = false;
                    gridApi.paginationGoToPage(targetPage);
                    return;
                }
                setStatus(`Scan complete.`);
                setProgress(100);
                lastAnalyzedPage = currentPage;
                handleAutoNavigation(currentPage, totalPages, remainingUnanalyzed);
                isPageAnalyzing = false;
                return;
            }

            const BATCH_SIZE = 5;
            let completedCount = 0;
            const totalOnPage = symbolsToAnalyze.length;
            setStatus(`0/${totalOnPage} on Page ${currentPage + 1}...`);
            setProgress(5);

            const batches = [];
            for (let i = 0; i < symbolsToAnalyze.length; i += BATCH_SIZE) {
                batches.push(symbolsToAnalyze.slice(i, i + BATCH_SIZE));
            }

            const tasks = batches.map(async (batch) => {
                try {
                    const map = await fetchQuickScoreBatch(batch, index_name);
                    const updates = [];
                    for (const s of batch) {
                        if (map[s]) {
                            const node = gridApi.getRowNode(s);
                            if (node && node.data) {
                                updates.push({
                                    ...node.data,
                                    ...map[s],
                                    name: node.data.name,
                                    corp_action: node.data.corp_action
                                });
                            }
                        }
                    }
                    if (updates.length > 0) gridApi.applyTransaction({ update: updates });
                } catch (err) {
                    console.error("Batch permanently failed:", batch, err);
                } finally {
                    completedCount += batch.length;
                    setProgress(Math.max(5, Math.floor((completedCount / totalOnPage) * 100)));
                    setStatus(`${completedCount}/${totalOnPage} on Page ${currentPage + 1}...`);
                }
            });

            await Promise.all(tasks);

            setStatus(`Page ${currentPage + 1} Complete.`);
            setProgress(100);
            lastAnalyzedPage = currentPage;
            handleAutoNavigation(currentPage, totalPages, Math.max(0, remainingUnanalyzed - symbolsToAnalyze.length));
            isPageAnalyzing = false;
        }

        async function handleAutoNavigation(currentPage, totalPages, remainingUnanalyzed) {
            if (!isAutoAnalysisActive) return;
            if (remainingUnanalyzed > 0) {
                await wait(800);
                if (currentPage < totalPages - 1) gridApi.paginationGoToNextPage();
                else gridApi.paginationGoToFirstPage();
            } else {
                setStatus("Market Scan Complete!");
                stopAutoAnalyze();
                alert("Full Market Scan Complete! 🚀");
            }
        }

        function startAutoAnalyze() {
            if (isAutoAnalysisActive) return;
            isAutoAnalysisActive = true;
            document.getElementById("startBtn").disabled = true;
            document.getElementById("stopBtn").disabled = false;
            document.getElementById("loadBtn").disabled = true;
            document.getElementById("startBtn").innerText = "Running...";
            lastAnalyzedPage = -1;
            gridApi.paginationGoToFirstPage();
            analyzeCurrentView();
        }

        function stopAutoAnalyze() {
            isAutoAnalysisActive = false;
            const btn = document.getElementById("startBtn");
            btn.disabled = false;
            btn.innerText = "Start Auto Analysis";
            btn.style.background = "#007bff";
            document.getElementById("stopBtn").disabled = true;
            document.getElementById("loadBtn").disabled = false;
            setStatus("Stopped.");
            setProgress(0);
        }

        async function loadIndex() {
            const idx = document.getElementById("indexSelect").value;
            setStatus(`Loading ${idx}...`);
            document.getElementById("loadBtn").disabled = true;
            if (isAutoAnalysisActive) stopAutoAnalyze();
            try {
                const res = await fetch(`/load_index/${idx}`);
                const j = await res.json();
                if (j.error) {
                    setStatus(`Error: ${j.error}`);
                } else {
                    _corpActionsReady = j.corp_actions_ready;
                    const rowData = j.tickers.map(t => ({
                        symbol: t,
                        name: j.pairs ? j.pairs[t] : t,
                        score: null,
                        confidence: 0,
                        recommendation: "--",
                        bull_signal: "--",
                        profile_category: null,
                        setup_signal: null,
                        best_strategy: null,
                        fitting_strategies: null,
                        best_fit_horizon: null,
                        top_pattern: null,
                        profit_pct: null,
                        entry_trigger: null,
                        t1: null,
                        rrRatio: null,
                        sl_dist: null,
                        intra_score: null,
                        short_score: null,
                        long_score: null,
                        sectorName: null,
                        sectorBenchmark: null,
                        sectorTrendScore: null,
                        rsVsSectorFast: null,
                        rsVsSectorSlow: null,
                        corp_action: (j.corp_actions || {})[t] || ""
                    }));
                    gridApi.setGridOption('rowData', rowData);
                    gridApi.paginationGoToFirstPage();
                    setStatus(`Loaded ${rowData.length} tickers.`);
                    document.getElementById("startBtn").disabled = false;
                }
            } catch (err) { setStatus("Load failed."); }
            document.getElementById("loadBtn").disabled = false;
        }

        async function fetchCorpActions() {
            const btn = document.getElementById('fetchCorpBtn');
            btn.disabled = true;
            try {
                const res = await fetch('/api/fetch_corp_actions', { method: 'POST' });
                const data = await res.json();
                if (data.status === 'ok') {
                    _corpActionsReady = true;
                    if (gridApi) {
                        const tickers = [];
                        gridApi.forEachNode(n => tickers.push(n.data.symbol));
                        await populateCorporateActions(tickers);
                        gridApi.refreshCells({ columns: ['corp_action'], force: true });
                    }
                }
            } catch (e) { console.error(e); }
            btn.disabled = false;
        }

        async function populateCorporateActions(tickers) {
            if (!tickers || tickers.length === 0) return;
            const CHUNK_SIZE = 50;
            for (let i = 0; i < tickers.length; i += CHUNK_SIZE) {
                const chunk = tickers.slice(i, i + CHUNK_SIZE);
                try {
                    const res = await fetch('/corporate_action_summary', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ tickers: chunk })
                    });
                    const summary = await res.json();
                    const updates = [];
                    for (const [sym, info] of Object.entries(summary)) {
                        const node = gridApi.getRowNode(sym);
                        if (node) updates.push({ ...node.data, corp_action: info });
                    }
                    if (updates.length > 0) gridApi.applyTransaction({ update: updates });
                    await wait(200);
                } catch (e) { }
            }
        }
    </script>
</body>

</html>
